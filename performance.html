<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 및 성과 관리 시스템 - 성과관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap');
:root{
  --navy:#1a2744;--navy-mid:#253360;--blue:#2e5bff;--blue-lt:#e8eeff;
  --teal:#00b6a8;--teal-lt:#e0f7f5;--amber:#f5a623;--amber-lt:#fff4e0;
  --red:#e53935;--red-lt:#fdecea;--green:#29a745;--green-lt:#e8f5e9;
  --purple:#7c3aed;--purple-lt:#ede9fe;--orange:#f97316;--orange-lt:#fff7ed;
  --gray-0:#f7f8fc;--gray-1:#eef0f5;--gray-2:#d6dae6;--gray-3:#9ba3b8;
  --gray-4:#6b738a;--text:#1e2640;--white:#fff;
  --shadow:0 2px 12px rgba(26,39,68,.10);--shadow-lg:0 8px 32px rgba(26,39,68,.16);
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--gray-0);color:var(--text);}

/* HEADER */
.header{background:var(--navy);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.header-left{display:flex;align-items:center;gap:12px;}
.back-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s;}
.back-btn:hover{background:rgba(255,255,255,.2);}
.header-title{color:#fff;font-size:16px;font-weight:700;}
.header-badge{background:var(--teal);color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
.sync-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;}
.sync-status{font-size:11px;color:rgba(255,255,255,.6);margin-left:8px;}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 60px);}
.sidebar{width:240px;background:var(--white);border-right:1px solid var(--gray-1);padding:20px 0;flex-shrink:0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;}
.sidebar-section{padding:10px 16px 4px;font-size:10px;font-weight:700;color:var(--gray-3);letter-spacing:.08em;text-transform:uppercase;}
.sidebar-menu{list-style:none;}
.sidebar-menu li a{display:flex;align-items:center;gap:8px;padding:10px 18px;font-size:13px;font-weight:500;color:var(--gray-4);cursor:pointer;border-left:3px solid transparent;transition:all .15s;}
.sidebar-menu li a:hover,.sidebar-menu li a.active{background:var(--blue-lt);color:var(--blue);border-left-color:var(--blue);}
.content{flex:1;padding:28px 32px;overflow-x:hidden;}

/* CARDS */
.page-title{font-size:22px;font-weight:900;color:var(--navy);margin-bottom:4px;}
.page-subtitle{font-size:13px;color:var(--gray-4);margin-bottom:24px;}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;margin-bottom:20px;}
.card-title{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border-top:4px solid var(--gray-2);}
.stat-card.green{border-top-color:var(--green);}
.stat-card.blue{border-top-color:var(--blue);}
.stat-card.amber{border-top-color:var(--amber);}
.stat-card.red{border-top-color:var(--red);}
.stat-label{font-size:11px;font-weight:600;color:var(--gray-4);margin-bottom:6px;}
.stat-value{font-size:26px;font-weight:900;font-family:'IBM Plex Mono',monospace;color:var(--navy);}
.stat-sub{font-size:11px;color:var(--gray-3);margin-top:4px;}

/* INDICATOR TABLE */
.indicator-table{width:100%;border-collapse:collapse;font-size:13px;}
.indicator-table th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left;font-size:12px;font-weight:600;white-space:nowrap;}
.indicator-table td{padding:10px 12px;border-bottom:1px solid var(--gray-1);vertical-align:top;}
.indicator-table tr:last-child td{border-bottom:none;}
.indicator-table tr:hover td{background:var(--gray-0);}

/* BADGE */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-required{background:#fef3c7;color:#92400e;}
.badge-advanced{background:var(--purple-lt);color:var(--purple);}
.badge-green{background:var(--green-lt);color:#1a6e2e;}
.badge-amber{background:var(--amber-lt);color:#7a5000;}
.badge-red{background:var(--red-lt);color:var(--red);}
.badge-gray{background:var(--gray-1);color:var(--gray-4);}
.badge-blue{background:var(--blue-lt);color:var(--blue);}

/* PROGRESS */
.progress-wrap{display:flex;align-items:center;gap:8px;min-width:120px;}
.progress-bar{flex:1;height:8px;background:var(--gray-1);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width .5s;}
.progress-fill.green{background:var(--green);}
.progress-fill.blue{background:var(--blue);}
.progress-fill.amber{background:var(--amber);}
.progress-fill.red{background:var(--red);}
.progress-label{font-family:'IBM Plex Mono',monospace;font-size:12px;white-space:nowrap;font-weight:600;}

/* CHART CONTAINER */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
.chart-box{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;}
.chart-box.full{grid-column:1/-1;}
.chart-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;}
.chart-container{position:relative;height:260px;}

/* MAPPING */
.mapping-section{margin-top:16px;}
.mapping-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--gray-1);border-radius:8px;margin-bottom:6px;font-size:13px;cursor:pointer;transition:background .15s;}
.mapping-row:hover{background:var(--gray-0);}
.mapping-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;}
.mapping-row .prog-name{flex:1;font-weight:500;}
.mapping-row .prog-meta{font-size:11px;color:var(--gray-4);}
.mapping-row .prog-value{font-size:12px;font-weight:600;color:var(--blue);font-family:'IBM Plex Mono',monospace;}

/* DETAIL PANEL */
.detail-panel{background:var(--gray-0);border-radius:8px;padding:14px;margin-top:12px;font-size:13px;}
.detail-row{display:flex;gap:8px;margin-bottom:6px;}
.detail-label{color:var(--gray-4);font-weight:600;min-width:80px;flex-shrink:0;}
.detail-val{color:var(--text);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding:20px 0;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:14px;width:760px;max-width:96vw;margin:auto;box-shadow:var(--shadow-lg);}
.modal-header{padding:20px 24px 14px;border-bottom:1px solid var(--gray-1);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:17px;font-weight:800;color:var(--navy);}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray-3);}
.modal-body{padding:20px 24px;}
.modal-footer{padding:14px 24px;border-top:1px solid var(--gray-1);display:flex;justify-content:flex-end;gap:10px;}

/* FORM */
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--gray-4);margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1.5px solid var(--gray-2);border-radius:7px;font-family:inherit;font-size:13px;color:var(--text);background:var(--white);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-row.triple{grid-template-columns:1fr 1fr 1fr;}

/* BUTTONS */
.btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .18s;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:#1a44e8;}
.btn-ghost{background:transparent;color:var(--gray-4);border:1px solid var(--gray-2);}
.btn-ghost:hover{background:var(--gray-1);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}

/* ALERT */
.alert{border-radius:8px;padding:11px 16px;font-size:13px;margin-bottom:14px;}
.alert-blue{background:var(--blue-lt);border:1px solid var(--blue);color:#1a3abf;}
.alert-green{background:var(--green-lt);border:1px solid var(--green);color:#1a6e2e;}

/* YEAR TABS */
.year-tabs{display:flex;gap:6px;margin-bottom:20px;}
.year-tab{padding:8px 20px;border-radius:20px;border:1.5px solid var(--gray-2);font-size:13px;font-weight:600;cursor:pointer;color:var(--gray-4);background:var(--white);}
.year-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;box-shadow:var(--shadow-lg);z-index:999;opacity:0;transform:translateY(12px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}

/* TARGET VALUE DISPLAY */
.target-years{display:flex;gap:6px;flex-wrap:wrap;}
.target-year-chip{background:var(--gray-1);border-radius:4px;padding:2px 8px;font-size:11px;font-family:'IBM Plex Mono',monospace;}
.target-year-chip.current{background:var(--blue-lt);color:var(--blue);font-weight:700;}

/* 현재값 입력 */
.current-val-input{width:90px;padding:4px 8px;border:1.5px solid var(--blue);border-radius:5px;font-size:12px;font-family:'IBM Plex Mono',monospace;text-align:center;}

@media(max-width:768px){
  .sidebar{display:none;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .chart-grid{grid-template-columns:1fr;}
  .chart-box.full{grid-column:1;}
  .content{padding:16px 14px;}
}
</style>
</head>

//  STATE

let currentTab = 'overview';
let editingIndicatorId = null;
let mappingIndicatorId = null;
let tasks = [];

// ══════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════
function getTasks() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY+'_tasks')) || []; } catch(e) { return []; }
}
function getPerfData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY+'_perf')) || {}; } catch(e) { return {}; }
}
function savePerfData(d) {
  localStorage.setItem(STORE_KEY+'_perf', JSON.stringify(d));
  scheduleSyncPerf();
}

// 지표별 현재값 (덮어쓰기 포함)
function getIndicatorData(id) {
  const d = getPerfData();
  return d[id] || {};
}
function saveIndicatorData(id, data) {
  const d = getPerfData();
  d[id] = { ...(d[id]||{}), ...data, updatedAt: new Date().toISOString() };
  savePerfData(d);
}
// 매핑 데이터
function getMappings() {
  const d = getPerfData();
  return d._mappings || {};
}
function saveMappings(m) {
  const d = getPerfData();
  d._mappings = m;
  savePerfData(d);
}

// ══════════════════════════════════════════
//  서버 동기화
// ══════════════════════════════════════════
let _syncTimer = null;
function scheduleSyncPerf() {
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncPerfToServer, 2000);
}
async function syncPerfToServer() {
  if (APPS_SCRIPT_URL.includes('YOUR_SCRIPT_ID')) return;
  try {
    const data = getPerfData();
    const dataStr = encodeURIComponent(JSON.stringify({ perf: data }));
    await fetch(APPS_SCRIPT_URL + '?action=savePerf&data=' + dataStr);
    document.getElementById('sync-status').textContent = '✓ 저장됨';
    document.getElementById('sync-status').style.color = 'rgba(100,255,150,.9)';
  } catch(e) {
    document.getElementById('sync-status').textContent = '⚠ 저장 실패';
  }
}

async function refreshAll() {
  tasks = getTasks();
  // 서버에서 최신 tasks 로드
  if (!APPS_SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
    try {
      const res = await fetch(APPS_SCRIPT_URL + '?action=getAll&t=' + Date.now());
      const json = await res.json();
      if (json.ok && json.data && json.data.tasks) {
        tasks = json.data.tasks;
        localStorage.setItem(STORE_KEY+'_tasks', JSON.stringify(tasks));
      }
    } catch(e) { console.warn('서버 로드 실패:', e); }
  }
  showTab(currentTab);
  toast('최신 데이터로 갱신됨', 'success');
}

// 매핑 기반 실시간 현재값 계산
function calcMappedValue(indicator) {
  const mappings = getMappings();
  const mapped = mappings[indicator.id] || [];
  if (mapped.length === 0) return null;

  const mappedTasks = tasks.filter(t => mapped.includes(t.id));
  if (mappedTasks.length === 0) return null;

  switch(indicator.mappingType) {
    case 'count':
      // 완료/진행중 업무 건수
      return mappedTasks.filter(t => {
        const s = overallStatus(t.stages);
        return s === '완료' || s === '진행중';
      }).length;
    case 'participants':
      // 국제학생 참여자 합계
      return mappedTasks.reduce((sum, t) => sum + (Number(t.pIntl)||0), 0);
    case 'manual':
      return null; // 수동 입력
    default:
      return mappedTasks.length;
  }
}

function overallStatus(stages) {
  if (!stages) return '미진행';
  const v = Object.values(stages);
  if (v.every(x => x==='완료'||x==='PASS')) return '완료';
  if (v.some(x => x==='진행중'||x==='완료')) return '진행중';
  return '미진행';
}

// 최종 현재값: 수동입력 > 매핑계산 > 기본값
function getFinalValue(indicator) {
  const d = getIndicatorData(indicator.id);
  if (d.manualVal !== undefined && d.manualVal !== null && d.manualVal !== '') {
    return Number(d.manualVal);
  }
  const mapped = calcMappedValue(indicator);
  if (mapped !== null) return mapped;
  return indicator.currentVal;
}

function getAchieveRate(indicator) {
  const cur = getFinalValue(indicator);
  const target = indicator.targets['2026'];
  if (!target) return null;
  return Math.round(cur / target * 100);
}

function getRateColor(rate) {
  if (rate >= 100) return 'green';
  if (rate >= 80)  return 'blue';
  if (rate >= 60)  return 'amber';
  return 'red';
}
function getRateBadge(rate) {
  if (rate >= 100) return '<span class="badge badge-green">달성</span>';
  if (rate >= 80)  return '<span class="badge badge-blue">근접</span>';
  if (rate >= 60)  return '<span class="badge badge-amber">주의</span>';
  return '<span class="badge badge-red">미달</span>';
}

const $c = () => document.getElementById('main-content');

function showTab(tab) {
  currentTab = tab;
  // 사이드바 active
  document.querySelectorAll('.sidebar-menu li a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('onclick') && a.getAttribute('onclick').includes("'"+tab+"'"));
  });
  // 차트 제거
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};

  const renders = {
    overview: renderOverview,
    chart: renderCharts,
    fee: () => renderIndicatorDetail('fee'),
    law: () => renderIndicatorDetail('law'),
    industry: renderIndustry,
    life: renderLife,
    employ: () => renderIndicatorDetail('employ'),
    visa: () => renderIndicatorDetail('visa'),
    mapping: renderMapping,
    'settings-perf': renderSettingsPerf,
  };
  if (renders[tab]) $c().innerHTML = renders[tab]();
  else $c().innerHTML = renderOverview();

  // 차트 그리기 (DOM 생성 후)
  if (tab === 'overview') drawOverviewCharts();
  if (tab === 'chart') drawAllCharts();
}

  const cmpInds = inds.filter(i => i.achieved25_2 !== null && i.achieved26_1 !== null);
  if (cmpEl && cmpInds.length) {
    charts.compare = new Chart(cmpEl, {
      type: 'bar',
      data: {
        labels: cmpInds.map(i => i.name.length>12?i.name.slice(0,12)+'…':i.name),
        datasets: [
          { label: '25-2학기', data: cmpInds.map(i => i.achieved25_2), backgroundColor: 'rgba(124,58,237,.5)', borderColor: '#7c3aed', borderWidth: 1 },
          { label: '26-1학기', data: cmpInds.map(i => i.achieved26_1), backgroundColor: 'rgba(0,182,168,.5)', borderColor: '#00b6a8', borderWidth: 1 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } },
        scales: { y: { beginAtZero: true }, x: { ticks: { font: { size: 10 } } } }
      }
    });
  }
}

// ── 지표 상세 ──
function renderIndicatorDetail(id) {
  const ind = IEQAS_PROJECT.indicators.find(i => i.id === id);
  if (!ind) return '<div class="page-title">지표를 찾을 수 없습니다.</div>';

  const cur = getFinalValue(ind);
  const rate = getAchieveRate(ind);
  const color = getRateColor(rate||0);
  const mappings = getMappings();
  const mappedIds = mappings[ind.id] || [];
  const mappedTasks = tasks.filter(t => mappedIds.includes(t.id));
  const d = getIndicatorData(ind.id);

  const targetRows = Object.entries(ind.targets).map(([yr, val]) =>
    `<div class="target-year-chip ${yr==='2026'?'current':''}">${yr}: ${val}${ind.unit}</div>`
  ).join('');

  const taskRows = mappedTasks.length ? mappedTasks.map(t => {
    const s = overallStatus(t.stages);
    const pct = calcProgress(t.stages);
    const val = ind.mappingType === 'participants' ? (t.pIntl||0)+'명' : '';
    return `<div class="mapping-row" style="cursor:default">
      <div class="prog-name">${t.name}</div>
      <div class="prog-meta">${t.manager} · ${t.semester}</div>
      <div class="prog-value">${val || (s==='완료'?'✓완료':s==='진행중'?'진행중':'미진행')}</div>
    </div>`;
  }).join('') : '<div style="color:var(--gray-3);font-size:13px;padding:12px 0">매핑된 프로그램이 없습니다. 매핑 버튼을 클릭하여 설정하세요.</div>';

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <div>
      <div class="page-title">${ind.name}</div>
      <div class="page-subtitle">${ind.group} · <span class="badge ${ind.type==='required'?'badge-required':'badge-advanced'}">${ind.type==='required'?'필수지표':'고도화지표'}</span></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-teal" onclick="openInputModal('${ind.id}')">✏️ 현재값 입력</button>
      <button class="btn btn-ghost" onclick="openMappingModal('${ind.id}')">🔗 프로그램 매핑</button>
    </div>
  </div>

  <div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="stat-card ${color}">
      <div class="stat-label">현재값</div>
      <div class="stat-value">${cur}<span style="font-size:14px;font-weight:400;font-family:inherit">${ind.unit}</span></div>
      <div class="stat-sub">${d.manualVal!==undefined&&d.manualVal!==''?'수동입력':mappedIds.length>0?'매핑 자동계산':'기본값'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">2026 목표</div>
      <div class="stat-value">${ind.targets['2026']}<span style="font-size:14px;font-weight:400;font-family:inherit">${ind.unit}</span></div>
    </div>
    <div class="stat-card ${color}">
      <div class="stat-label">달성률</div>
      <div class="stat-value">${rate||0}<span style="font-size:16px;font-weight:400;font-family:inherit">%</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">매핑 프로그램</div>
      <div class="stat-value">${mappedIds.length}<span style="font-size:14px;font-weight:400;font-family:inherit">개</span></div>
    </div>
  </div>

  <div class="chart-grid" style="grid-template-columns:2fr 1fr">
    <div class="card">
      <div class="card-title">📋 지표 정보</div>
      <div class="detail-panel" style="background:transparent;padding:0">
        <div class="detail-row"><span class="detail-label">산출식</span><span class="detail-val" style="font-size:12px;color:var(--gray-4)">${ind.formula}</span></div>
        <div class="detail-row"><span class="detail-label">설명</span><span class="detail-val">${ind.description}</span></div>
        <div class="detail-row"><span class="detail-label">연도별 목표</span><div class="target-years">${targetRows}</div></div>
        ${ind.note?`<div class="detail-row"><span class="detail-label">비고</span><span class="detail-val" style="color:var(--amber)">${ind.note}</span></div>`:''}
      </div>
      <div style="margin-top:16px">
        <div style="font-size:12px;font-weight:600;color:var(--gray-4);margin-bottom:8px">달성률</div>
        <div class="progress-wrap" style="height:20px">
          <div class="progress-bar" style="height:16px;border-radius:8px">
            <div class="progress-fill ${color}" style="width:${Math.min(rate||0,100)}%;height:100%;border-radius:8px"></div>
          </div>
          <span class="progress-label" style="font-size:16px;font-weight:700">${rate||0}%</span>
        </div>
      </div>

    <div class="chart-box">
      <div class="chart-title">📊 달성 현황</div>

  </div>

  <div class="card">
    <div class="card-title">🔗 매핑된 프로그램 (${mappedIds.length}개)</div>

    <table class="indicator-table">

      <tbody>
        <tr><td>25-2학기</td><td>${ind.semTargets?.['25-2']??'-'}${ind.unit}</td><td>${ind.achieved25_2??'-'}${ind.achieved25_2!=null?ind.unit:''}</td><td>${ind.achieved25_2!=null&&ind.semTargets?.['25-2']?Math.round(ind.achieved25_2/ind.semTargets['25-2']*100)+'%':'-'}</td></tr>
        <tr><td>26-1학기</td><td>${ind.semTargets?.['26-1']??'-'}${ind.unit}</td><td>${ind.achieved26_1??'-'}${ind.achieved26_1!=null?ind.unit:''}</td><td>${ind.achieved26_1!=null&&ind.semTargets?.['26-1']?Math.round(ind.achieved26_1/ind.semTargets['26-1']*100)+'%':'-'}</td></tr>
        <tr style="background:var(--blue-lt)"><td><strong>2026 연간 합계</strong></td><td><strong>${ind.targets['2026']}${ind.unit}</strong></td><td><strong>${cur}${ind.unit}</strong></td><td><strong>${rate||0}%</strong></td></tr>
      </tbody>
    </table>
  </div>`;
}

function calcProgress(stages) {
  if (!stages) return 0;
  const v = Object.values(stages);
  return Math.round(v.filter(x => x==='완료'||x==='PASS').length / v.length * 100);
}

// 차트 그리기 (지표 상세용)
setTimeout(() => {
  IEQAS_PROJECT.indicators.forEach(ind => {
    const el = document.getElementById('chart-ind-'+ind.id);
    if (!el) return;
    const rate = getAchieveRate(ind) || 0;
    const color = getRateColor(rate);
    const colorMap = { green:'#29a745', blue:'#2e5bff', amber:'#f5a623', red:'#e53935' };
    charts['ind_'+ind.id] = new Chart(el, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [Math.min(rate, 100), Math.max(0, 100-Math.min(rate,100))],
          backgroundColor: [colorMap[color], '#eef0f5'],
          borderWidth: 0
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '70%',
        plugins: {
          legend: { display: false },
          tooltip: { enabled: false }
        }
      },
      plugins: [{
        id: 'centerText',
        beforeDraw(chart) {
          const { ctx, chartArea: { top, bottom, left, right } } = chart;
          ctx.save();
          ctx.font = 'bold 22px IBM Plex Mono';
          ctx.fillStyle = colorMap[color];
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(rate + '%', (left+right)/2, (top+bottom)/2);
          ctx.restore();
        }
      }]
    });
  });
}, 100);

          <div style="font-size:12px;color:var(--gray-4)">목표: ${ind.targets['2026']}${ind.unit}</div>

        </div>
        <span class="progress-label" style="font-size:15px;font-weight:700">${rate||0}%</span>

      <div style="font-size:12px;color:var(--gray-4);margin-bottom:10px">${ind.formula}</div>

  const mappings = getMappings();

      <td style="font-size:12px;color:var(--gray-4)">${ind.mappingType==='count'?'프로그램 건수':ind.mappingType==='participants'?'참여 인원':'수동 입력'}</td>

// ══════════════════════════════════════════
//  MODALS

function openInputModal(id) {
  editingIndicatorId = id;
  const ind = IEQAS_PROJECT.indicators.find(i => i.id === id);
  if (!ind) return;
  const d = getIndicatorData(id);
  const mappedVal = calcMappedValue(ind);

  document.getElementById('modal-input-title').textContent = '✏️ 현재값 입력 — ' + ind.name;
  document.getElementById('modal-input-body').innerHTML = `
    <div class="detail-panel" style="margin-bottom:14px">
      <div class="detail-row"><span class="detail-label">산출식</span><span class="detail-val" style="font-size:12px">${ind.formula}</span></div>
      <div class="detail-row"><span class="detail-label">2026 목표</span><span class="detail-val">${ind.targets['2026']}${ind.unit}</span></div>
      ${mappedVal !== null ? `<div class="detail-row"><span class="detail-label">매핑 자동값</span><span class="detail-val" style="color:var(--blue);font-weight:700">${mappedVal}${ind.unit} (자동계산)</span></div>` : ''}
    </div>
    <div class="form-group">
      <label>현재값 직접 입력 ${ind.unit}</label>
      <input type="number" id="input-current-val" value="${d.manualVal??''}" placeholder="값 입력 (비우면 자동계산 사용)" step="0.1"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>25-2학기 실적</label>
        <input type="number" id="input-25-2" value="${d.achieved25_2??ind.achieved25_2??''}" step="0.1"/>
      </div>
      <div class="form-group">
        <label>26-1학기 실적</label>
        <input type="number" id="input-26-1" value="${d.achieved26_1??ind.achieved26_1??''}" step="0.1"/>
      </div>
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="input-memo" rows="2" placeholder="비고 사항">${d.memo||''}</textarea>
    </div>`;
  openModal('modal-input');
}

function saveDirectInput() {
  const id = editingIndicatorId;
  const val = document.getElementById('input-current-val').value;
  saveIndicatorData(id, {
    manualVal: val !== '' ? Number(val) : '',
    achieved25_2: document.getElementById('input-25-2').value !== '' ? Number(document.getElementById('input-25-2').value) : null,
    achieved26_1: document.getElementById('input-26-1').value !== '' ? Number(document.getElementById('input-26-1').value) : null,
    memo: document.getElementById('input-memo').value
  });
  closeModal('modal-input');
  toast('저장되었습니다.', 'success');
  showTab(currentTab);
}

function openMappingModal(id) {
  mappingIndicatorId = id;
  const ind = IEQAS_PROJECT.indicators.find(i => i.id === id);
  if (!ind) return;
  const mappings = getMappings();
  const mappedIds = mappings[id] || [];

  const taskItems = tasks.length
    ? tasks.map(t => `
      <div class="mapping-row">
        <input type="checkbox" id="map-${t.id}" ${mappedIds.includes(t.id)?'checked':''}/>
        <label for="map-${t.id}" style="flex:1;cursor:pointer">
          <div class="prog-name">${t.name}</div>
          <div class="prog-meta">${t.manager} · ${t.category} · ${t.semester}</div>
        </label>
        <div class="prog-value">${t.pIntl?t.pIntl+'명 국제학생':''}</div>
      </div>`).join('')
    : '<div style="color:var(--gray-3);padding:16px;text-align:center">등록된 업무가 없습니다.<br>메인 시스템에서 업무를 먼저 등록해 주세요.</div>';

  document.getElementById('modal-mapping-title').textContent = '🔗 프로그램 매핑 — ' + ind.name;
  document.getElementById('modal-mapping-body').innerHTML = `
    <div class="alert alert-blue" style="margin-bottom:14px">
      집계 방식: <strong>${ind.mappingType==='count'?'✅ 완료/진행중 프로그램 건수 집계':ind.mappingType==='participants'?'👤 국제학생(pIntl) 참여 인원 합계':'✏️ 수동 입력 (자동계산 없음)'}</strong>
    </div>
    <div style="max-height:400px;overflow-y:auto">${taskItems}</div>`;
  openModal('modal-mapping');
}

function saveMappingModal() {
  const id = mappingIndicatorId;
  const checkboxes = document.querySelectorAll('#modal-mapping-body input[type=checkbox]');
  const selectedIds = [];
  checkboxes.forEach(cb => { if (cb.checked) selectedIds.push(cb.id.replace('map-',''));  });
  const m = getMappings();
  m[id] = selectedIds;
  saveMappings(m);
  closeModal('modal-mapping');
  toast(`${selectedIds.length}개 프로그램이 매핑되었습니다.`, 'success');
  showTab(currentTab);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) closeModal(o.id); });
});

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2800);
}

function goBack() {
  window.location.href = 'index.html';
}

// ══════════════════════════════════════════
tasks = getTasks();
showTab('overview');

// 30초마다 자동 갱신
setInterval(async () => {
  if (!APPS_SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
    try {
      const res = await fetch(APPS_SCRIPT_URL + '?action=getAll&t=' + Date.now());
      const json = await res.json();
      if (json.ok && json.data && json.data.tasks) {
        tasks = json.data.tasks;
        localStorage.setItem(STORE_KEY+'_tasks', JSON.stringify(tasks));
        showTab(currentTab);
        document.getElementById('sync-status').textContent = '✓ 자동 갱신됨';
      }
    } catch(e) {}
  }
}, 30000);
</script>
