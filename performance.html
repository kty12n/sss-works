<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 및 성과 관리 시스템 - 성과관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --primary:#533afd;--primary-deep:#4434d4;--primary-press:#2e2b8c;
  --primary-soft:#665efd;--primary-sub:#b9b9f9;--primary-bg:#eeeeff;
  --brand-dark:#1c1e54;--ink:#0d253d;--ink-2:#273951;--ink-mute:#64748d;
  --canvas:#ffffff;--canvas-soft:#f6f9fc;--hairline:#e3e8ee;--hairline-input:#a8c3de;
  --ruby:#ea2261;
  --navy:var(--brand-dark);--navy-mid:#253360;
  --blue:var(--primary);--blue-lt:var(--primary-bg);
  --teal:#00b6a8;--teal-lt:#e0f7f5;
  --amber:#e5890a;--amber-lt:#fff4e0;
  --red:#ea2261;--red-lt:#fde8ef;
  --green:#1a9e5c;--green-lt:#e3f9ef;
  --purple:var(--primary);--purple-lt:var(--primary-bg);--orange:#f97316;--orange-lt:#fff7ed;
  --gray-0:var(--canvas-soft);--gray-1:#eef0f5;--gray-2:var(--hairline);
  --gray-3:#9ba3b8;--gray-4:var(--ink-mute);--text:var(--ink);--white:var(--canvas);
  --shadow:rgba(0,55,112,.08) 0 1px 3px;
  --shadow-md:rgba(0,55,112,.08) 0 8px 24px, rgba(0,55,112,.04) 0 2px 6px;
  --shadow-lg:rgba(0,55,112,.1) 0 16px 40px, rgba(0,55,112,.06) 0 4px 12px;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter','SF Pro Display',system-ui,sans-serif;background:var(--gray-0);color:var(--text);}

/* HEADER */
.header{background:var(--navy);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.header-left{display:flex;align-items:center;gap:12px;}
.back-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s;}
.back-btn:hover{background:rgba(255,255,255,.2);}
.header-title{color:#fff;font-size:16px;font-weight:700;}
.header-badge{background:var(--teal);color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
.sync-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;}
.sync-status{font-size:11px;color:rgba(255,255,255,.6);margin-left:8px;}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 60px);}
.sidebar{width:240px;background:var(--white);border-right:1px solid var(--gray-1);padding:20px 0;flex-shrink:0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;}
.sidebar-section{padding:10px 16px 4px;font-size:10px;font-weight:700;color:var(--gray-3);letter-spacing:.08em;text-transform:uppercase;}
.sidebar-menu{list-style:none;}
.sidebar-menu li a{display:flex;align-items:center;gap:8px;padding:10px 18px;font-size:13px;font-weight:500;color:var(--gray-4);cursor:pointer;border-left:3px solid transparent;transition:all .15s;}
.sidebar-menu li a:hover,.sidebar-menu li a.active{background:var(--blue-lt);color:var(--blue);border-left-color:var(--blue);}
.content{flex:1;padding:28px 32px;overflow-x:hidden;}

/* CARDS */
.page-title{font-size:22px;font-weight:300;letter-spacing:-.5px;color:var(--navy);margin-bottom:4px;}
.page-subtitle{font-size:13px;color:var(--gray-4);margin-bottom:24px;}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;margin-bottom:20px;}
.card-title{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border-top:4px solid var(--gray-2);}
.stat-card.green{border-top-color:var(--green);}
.stat-card.blue{border-top-color:var(--blue);}
.stat-card.amber{border-top-color:var(--amber);}
.stat-card.red{border-top-color:var(--red);}
.stat-label{font-size:11px;font-weight:600;color:var(--gray-4);margin-bottom:6px;}
.stat-value{font-size:26px;font-weight:900;font-family:monospace;color:var(--navy);}
.stat-sub{font-size:11px;color:var(--gray-3);margin-top:4px;}

/* INDICATOR TABLE */
.indicator-table{width:100%;border-collapse:collapse;font-size:13px;}
.indicator-table th{background:var(--ink);color:#fff;padding:10px 12px;text-align:left;font-size:12px;font-weight:600;white-space:nowrap;}
.indicator-table td{padding:10px 12px;border-bottom:1px solid var(--gray-1);vertical-align:top;}
.indicator-table tr:last-child td{border-bottom:none;}
.indicator-table tr:hover td{background:var(--gray-0);}

/* BADGE */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-required{background:#fef3c7;color:#92400e;}
.badge-advanced{background:var(--purple-lt);color:var(--purple);}
.badge-green{background:var(--green-lt);color:#1a6e2e;}
.badge-amber{background:var(--amber-lt);color:#7a5000;}
.badge-red{background:var(--red-lt);color:var(--red);}
.badge-gray{background:var(--gray-1);color:var(--gray-4);}
.badge-blue{background:var(--blue-lt);color:var(--blue);}

/* PROGRESS */
.progress-wrap{display:flex;align-items:center;gap:8px;min-width:120px;}
.progress-bar{flex:1;height:8px;background:var(--gray-1);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width .5s;}
.progress-fill.green{background:var(--green);}
.progress-fill.blue{background:var(--blue);}
.progress-fill.amber{background:var(--amber);}
.progress-fill.red{background:var(--red);}
.progress-label{font-family:monospace;font-size:12px;white-space:nowrap;font-weight:600;}

/* CHART CONTAINER */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
.chart-box{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;}
.chart-box.full{grid-column:1/-1;}
.chart-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;}
.chart-container{position:relative;height:260px;}

/* MAPPING */
.mapping-section{margin-top:16px;}
.mapping-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--gray-1);border-radius:8px;margin-bottom:6px;font-size:13px;cursor:pointer;transition:background .15s;}
.mapping-row:hover{background:var(--gray-0);}
.mapping-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;}
.mapping-row .prog-name{flex:1;font-weight:500;}
.mapping-row .prog-meta{font-size:11px;color:var(--gray-4);}
.mapping-row .prog-value{font-size:12px;font-weight:600;color:var(--blue);font-family:monospace;}

/* DETAIL PANEL */
.detail-panel{background:var(--gray-0);border-radius:8px;padding:14px;margin-top:12px;font-size:13px;}
.detail-row{display:flex;gap:8px;margin-bottom:6px;}
.detail-label{color:var(--gray-4);font-weight:600;min-width:80px;flex-shrink:0;}
.detail-val{color:var(--text);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding:20px 0;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:14px;width:760px;max-width:96vw;margin:auto;box-shadow:var(--shadow-lg);}
.modal-header{padding:20px 24px 14px;border-bottom:1px solid var(--gray-1);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:17px;font-weight:800;color:var(--navy);}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray-3);}
.modal-body{padding:20px 24px;}
.modal-footer{padding:14px 24px;border-top:1px solid var(--gray-1);display:flex;justify-content:flex-end;gap:10px;}

/* FORM */
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--gray-4);margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1.5px solid var(--gray-2);border-radius:7px;font-family:inherit;font-size:13px;color:var(--text);background:var(--white);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(83,58,253,.1);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-row.triple{grid-template-columns:1fr 1fr 1fr;}

/* BUTTONS */
.btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .18s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#1a44e8;}
.btn-ghost{background:transparent;color:var(--gray-4);border:1px solid var(--gray-2);}
.btn-ghost:hover{background:var(--gray-1);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}

/* ALERT */
.alert{border-radius:8px;padding:11px 16px;font-size:13px;margin-bottom:14px;}
.alert-blue{background:var(--blue-lt);border:1px solid var(--blue);color:#1a3abf;}
.alert-green{background:var(--green-lt);border:1px solid var(--green);color:#1a6e2e;}

/* YEAR TABS */
.year-tabs{display:flex;gap:6px;margin-bottom:20px;}
.year-tab{padding:8px 20px;border-radius:20px;border:1.5px solid var(--gray-2);font-size:13px;font-weight:600;cursor:pointer;color:var(--gray-4);background:var(--white);}
.year-tab.active{background:var(--ink);color:#fff;border-color:var(--navy);}

/* TOAST */
.info-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;}
.info-popup{background:var(--white);border-radius:14px;width:780px;max-width:96vw;box-shadow:0 16px 48px rgba(0,0,0,.25);overflow:hidden;}
.info-popup-header{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;}
.info-popup-header h3{font-size:17px;font-weight:800;}
.info-popup-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.info-popup-body{padding:22px 24px;max-height:75vh;overflow-y:auto;}
.info-section{margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--gray-1);}
.info-section:last-child{border-bottom:none;margin-bottom:0;}
.info-section-title{font-size:12px;font-weight:700;color:var(--gray-4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.info-section-body{font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap;}
.info-tag{display:inline-block;background:var(--blue-lt);color:var(--blue);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;margin-right:4px;margin-bottom:4px;}
.info-tag.amber{background:var(--amber-lt);color:#8a6000;}
.info-tag.green{background:var(--green-lt);color:#1a6e2e;}
.info-btn{background:none;border:1px solid var(--gray-2);border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--gray-4);margin-left:6px;}
.info-btn:hover{background:var(--blue-lt);color:var(--blue);border-color:var(--primary);box-shadow:0 0 0 3px rgba(83,58,253,.1);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;box-shadow:var(--shadow-lg);z-index:999;opacity:0;transform:translateY(12px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}

/* TARGET VALUE DISPLAY */
.target-years{display:flex;gap:6px;flex-wrap:wrap;}
.target-year-chip{background:var(--gray-1);border-radius:4px;padding:2px 8px;font-size:11px;font-family:monospace;}
.target-year-chip.current{background:var(--blue-lt);color:var(--blue);font-weight:700;}

/* 현재값 입력 */
.current-val-input{width:90px;padding:4px 8px;border:1.5px solid var(--blue);border-radius:5px;font-size:12px;font-family:monospace;text-align:center;}

/* ── 모바일 햄버거 버튼 ── */
.hamburger-perf{display:none;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 10px;border-radius:6px;font-size:18px;cursor:pointer;line-height:1;margin-right:4px;}
.sidebar-overlay-perf{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;}

@media(max-width:768px){
  /* 햄버거 표시 */
  .hamburger-perf{display:flex;align-items:center;justify-content:center;}
  /* 사이드바: 슬라이드 방식 */
  .sidebar{
    position:fixed!important;top:0;left:0;bottom:0;
    width:260px!important;z-index:60;
    transform:translateX(-100%);transition:transform .28s ease;
    height:100vh;padding-top:16px;
    box-shadow:4px 0 20px rgba(0,0,0,.25);
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay-perf.show{display:block;}
  /* 레이아웃 */
  .layout{display:block;}
  .content{padding:14px 12px;width:100%;overflow-x:hidden;max-width:100vw;}
  /* 통계 */
  .stat-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px!important;}
  .stat-card{padding:12px 10px;}
  .stat-value{font-size:22px!important;}
  /* 차트 */
  .chart-grid{grid-template-columns:1fr!important;}
  .chart-box.full{grid-column:1!important;}
  .chart-container{height:200px!important;}
  /* 테이블 */
  .indicator-table{font-size:11px;}
  .indicator-table th,.indicator-table td{padding:6px 5px;white-space:nowrap;}
  /* 카드 */
  .card{padding:14px 12px;}
  .card-title{font-size:13px;}
  .page-title{font-size:18px!important;}
  .page-subtitle{font-size:12px;}
  /* 버튼 */
  .btn{padding:6px 10px;font-size:12px;}
  .btn-sm{padding:5px 8px;font-size:11px;}
  .btn-xs{padding:3px 7px;font-size:11px;}
  /* 헤더 */
  .header-title{font-size:12px;}
  .header-badge{font-size:9px;padding:2px 5px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sync-status{display:none;}
  /* 모달 */
  .modal{width:96vw!important;max-height:90vh;overflow-y:auto;}
  .modal-body{padding:14px 12px;}
  .modal-header{padding:12px 14px 8px;}
  .modal-footer{padding:10px 14px;}
  .form-row,.form-row.triple{grid-template-columns:1fr!important;gap:0!important;}
  /* 매핑 */
  .mapping-row{flex-wrap:wrap;gap:6px;}
  .progress-wrap{min-width:80px;}
  .progress-bar{min-width:40px;}
  table{min-width:100%;}
  .table-wrap-mobile{overflow-x:auto;-webkit-overflow-scrolling:touch;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="hamburger-perf" onclick="togglePerfSidebar()" id="hamburger-perf">☰</button>
    <button class="back-btn" onclick="goBack()">← 메인으로</button>
    <div class="header-title">📊 성과 관리</div>
    <span class="header-badge">교육국제화역량 인증제(IEQAS)</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="sync-status" id="sync-status">✓ 연동됨</span>
    <button class="sync-btn" onclick="refreshAll()">🔄 새로고침</button>
  </div>
</header>

<div class="sidebar-overlay-perf" id="sidebar-overlay-perf" onclick="closePerfSidebar()"></div>
<div class="layout">
  <nav class="sidebar" id="perf-sidebar">
    <ul class="sidebar-menu">
      <div class="sidebar-section">성과 개요</div>
      <li><a onclick="showTab('overview')" class="active">📊 전체 현황</a></li>
      <li><a onclick="showTab('chart')">📈 차트 분석</a></li>
      <div class="sidebar-section">지표별 관리</div>
      <li><a onclick="showTab('fee')">💰 유학생 등록금 부담률</a></li>
      <li><a onclick="showTab('law')">⚖️ 한국법령 이해교육</a></li>
      <li><a onclick="showTab('industry')">🏭 산학협력 노력</a></li>
      <li><a onclick="showTab('life')">🏠 생활 및 진로지원</a></li>
      <li><a onclick="showTab('employ')">💼 유학생 취업률</a></li>
      <li><a onclick="showTab('visa')">🛂 우수 비자 전환율</a></li>
      <div class="sidebar-section">관리자</div>
      <li><a onclick="showTab('mapping')">🔗 프로그램 매핑</a></li>
      <li><a onclick="showTab('settings-perf')">⚙️ 지표 설정</a></li>
    </ul>
  </nav>
  <div class="content" id="main-content"></div>
</div>

<!-- MODAL: 지표 직접 입력 -->
<div class="modal-overlay" id="modal-input">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-input-title">현재값 직접 입력</h3>
      <button class="modal-close" onclick="closeModal('modal-input')">✕</button>
    </div>
    <div class="modal-body" id="modal-input-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-input')">취소</button>
      <button class="btn btn-primary" onclick="saveDirectInput()">저장</button>
    </div>
  </div>
</div>

<!-- MODAL: 프로그램 매핑 설정 -->
<div class="modal-overlay" id="modal-mapping">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-mapping-title">프로그램 매핑 설정</h3>
      <button class="modal-close" onclick="closeModal('modal-mapping')">✕</button>
    </div>
    <div class="modal-body" id="modal-mapping-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-mapping')">취소</button>
      <button class="btn btn-primary" onclick="saveMappingModal()">저장</button>
    </div>
  </div>
</div>

<!-- 지표 상세 설명 팝업 -->
<div id="info-popup-overlay" class="info-popup-overlay" style="display:none" onclick="if(event.target===this)closeInfoPopup()">
  <div class="info-popup">
    <div class="info-popup-header">
      <h3 id="info-popup-title">지표 상세 설명</h3>
      <button class="info-popup-close" onclick="closeInfoPopup()">✕</button>
    </div>
    <div class="info-popup-body" id="info-popup-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  APPS SCRIPT URL (메인 시스템과 공유)
// ══════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxoCQ5Xp7TQNKzLbyysD7MJaniazIfgme2AQ3PS-oAxEiEQOEHemef2_BzuHUIT6Q5/exec';
const STORE_KEY = 'sj_v1';

// ══════════════════════════════════════════
//  IEQAS 지표 정의
// ══════════════════════════════════════════
const IEQAS_PROJECT = {
  id: 'ieqas',
  name: '교육국제화역량 인증제 (IEQAS)',
  description: '교육부 주관 외국인 유학생 관리 역량 인증 평가',
  year: 2026,
  indicators: [
    // ── 필수 지표 ──
    {
      id: 'fee',
      group: '유학생 등록금 부담률',
      name: '유학생 등록금 부담률',

let currentTab = 'overview';
let editingIndicatorId = null;
let mappingIndicatorId = null;
let tasks = [];
let perf = null; // 성과 데이터 (localStorage에서)

// ══════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════
function getTasks() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY+'_tasks')) || []; } catch(e) { return []; }
}
function getPerfData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY+'_perf')) || {}; } catch(e) { return {}; }
}
function savePerfData(d) {
  localStorage.setItem(STORE_KEY+'_perf', JSON.stringify(d));
  scheduleSyncPerf();
}

// 지표별 현재값 (덮어쓰기 포함)
function getIndicatorData(id) {
  const d = getPerfData();
  return d[id] || {};
}
function saveIndicatorData(id, data) {
  const d = getPerfData();
  d[id] = { ...(d[id]||{}), ...data, updatedAt: new Date().toISOString() };
  savePerfData(d);
}
// 매핑 데이터
function getMappings() {
  const d = getPerfData();
  return d._mappings || {};
}
function saveMappings(m) {
  const d = getPerfData();
  d._mappings = m;
  savePerfData(d);
}

// ══════════════════════════════════════════
//  서버 동기화
// ══════════════════════════════════════════
let _syncTimer = null;
function scheduleSyncPerf() {
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncPerfToServer, 2000);
}
async function syncPerfToServer() {
  if (APPS_SCRIPT_URL.includes('YOUR_SCRIPT_ID')) return;
  const el = document.getElementById('sync-status');
  try {
    const chunk = { action: 'savePerf', perf: getPerfData() };
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(chunk)
    });
    // no-cors는 응답 확인 불가 → 성공으로 간주
    el.textContent = '✓ 저장됨';
    el.style.color = 'rgba(100,255,150,.9)';
  } catch(e) {
    el.textContent = '⚠ 저장실패';
    el.style.color = 'rgba(255,150,100,.9)';
  }
}

async function refreshAll() {
  tasks = getTasks();
  // 서버에서 최신 tasks 로드
  if (!APPS_SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
    try {
      const res = await fetch(APPS_SCRIPT_URL + '?action=getAll&t=' + Date.now());
      const json = await res.json();
      if (json.ok && json.data) {
        if (json.data.tasks && json.data.tasks.length > 0) {
          tasks = json.data.tasks;
          localStorage.setItem(STORE_KEY+'_tasks', JSON.stringify(tasks));
        }
        // 성과 데이터도 불러오기
        if (json.data.perf && Object.keys(json.data.perf).length > 0) {
          localStorage.setItem(STORE_KEY+'_perf', JSON.stringify(json.data.perf));
        }
      }
    } catch(e) { console.warn('서버 로드 실패:', e); }
  }
  showTab(currentTab);
  toast('최신 데이터로 갱신됨', 'success');
}

// 매핑 기반 실시간 현재값 계산
function calcMappedValue(indicator) {
  const mappings = getMappings();
  const mapped = mappings[indicator.id] || [];
  if (mapped.length === 0) return null;

  const mappedTasks = tasks.filter(t => mapped.includes(t.id));
  if (mappedTasks.length === 0) return null;

  switch(indicator.mappingType) {
    case 'count':
      // 완료/진행중 업무 건수
      return mappedTasks.filter(t => {
        const s = overallStatus(t.stages);
        return s === '완료' || s === '진행중';
      }).length;
    case 'participants':
      // 국제학생 참여자 합계
      return mappedTasks.reduce((sum, t) => sum + (Number(t.pIntl)||0), 0);
    case 'manual':
      return null; // 수동 입력
    default:
      return mappedTasks.length;
  }
}

function overallStatus(stages) {
  if (!stages) return '미진행';
  const v = Object.values(stages);
  if (v.every(x => x==='완료'||x==='PASS')) return '완료';
  if (v.some(x => x==='진행중'||x==='완료')) return '진행중';
  return '미진행';
}

// 최종 현재값: 수동입력 > 매핑계산 > 기본값
function getFinalValue(indicator) {
  const d = getIndicatorData(indicator.id);
  if (d.manualVal !== undefined && d.manualVal !== null && d.manualVal !== '') {
    return Number(d.manualVal);
  }
  const mapped = calcMappedValue(indicator);
  if (mapped !== null) return mapped;
  return indicator.currentVal;
}

function getEffectiveTarget(indicator) {
  // 저장된 목표값 우선, 없으면 기본값
  const d = getIndicatorData(indicator.id);
  if (d.targets && d.targets['2026'] !== undefined) {
    // 메모리에도 반영
    indicator.targets['2026'] = d.targets['2026'];
    indicator.targets['2027'] = d.targets['2027'] ?? indicator.targets['2027'];
    indicator.targets['2028'] = d.targets['2028'] ?? indicator.targets['2028'];
  }
  return indicator.targets['2026'];
}

function getAchieveRate(indicator) {
  const cur = getFinalValue(indicator);
  const target = getEffectiveTarget(indicator);
  if (!target) return null;
  return Math.round(cur / target * 100);
}

function getRateColor(rate) {
  if (rate >= 100) return 'green';
  if (rate >= 80)  return 'blue';
  if (rate >= 60)  return 'amber';
  return 'red';
}
function getRateBadge(rate) {
  if (rate >= 100) return '<span class="badge badge-green">달성</span>';
  if (rate >= 80)  return '<span class="badge badge-blue">근접</span>';
  if (rate >= 60)  return '<span class="badge badge-amber">주의</span>';
  return '<span class="badge badge-red">미달</span>';
}

//  RENDER
// ══════════════════════════════════════════
const $c = () => document.getElementById('main-content');

function showTab(tab) {
  currentTab = tab;
  // 모바일: 탭 선택 시 사이드바 자동 닫기
  if (window.innerWidth <= 768) closePerfSidebar();
  // 사이드바 active
  document.querySelectorAll('.sidebar-menu li a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('onclick') && a.getAttribute('onclick').includes("'"+tab+"'"));
  });
  // 차트 제거
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};

  const renders = {
    overview: renderOverview,
    chart: renderCharts,
    fee: () => renderIndicatorDetail('fee'),
    law: () => renderIndicatorDetail('law'),
    industry: renderIndustry,
    life: renderLife,
    employ: () => renderIndicatorDetail('employ'),
    visa: () => renderIndicatorDetail('visa'),
    mapping: renderMapping,
    'settings-perf': renderSettingsPerf,
  };
  if (renders[tab]) $c().innerHTML = renders[tab]();
  else $c().innerHTML = renderOverview();

  // 차트 그리기 - requestAnimationFrame으로 DOM 완전 렌더링 후 실행
  const INDICATOR_TABS = ['fee','law','industry_mou','industry_fair','industry_settle','industry_intern','industry_region','life','career','employ','visa'];
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      if (tab === 'overview') drawOverviewCharts();
      if (tab === 'chart') drawAllCharts();
      if (INDICATOR_TABS.includes(tab)) drawIndicatorChart(tab);
    });
  });
}

// ── 전체 현황 ──
function renderOverview() {
  const inds = IEQAS_PROJECT.indicators;
  const achieved = inds.filter(i => (getAchieveRate(i)||0) >= 100).length;
  const near = inds.filter(i => { const r=getAchieveRate(i)||0; return r>=80&&r<100; }).length;
  const warn = inds.filter(i => { const r=getAchieveRate(i)||0; return r>=60&&r<80; }).length;
  const fail = inds.filter(i => (getAchieveRate(i)||0) < 60).length;

  const rows = inds.map(ind => {
    const cur = getFinalValue(ind);
    const target = ind.targets['2026'];
    const rate = getAchieveRate(ind);
    const color = getRateColor(rate||0);
    const mappings = getMappings();
    const isMapped = (mappings[ind.id]||[]).length > 0;
    return `<tr>
      <td><span class="badge ${ind.type==='required'?'badge-required':'badge-advanced'}">${ind.type==='required'?'필수':'고도화'}</span></td>
      <td style="font-size:11px;color:var(--gray-4)">${ind.group}</td>
      <td style="max-width:200px;font-size:13px"><strong>${ind.name}</strong></td>
      <td style="font-family:monospace;font-size:12px;text-align:center">${target}${ind.unit}</td>
      <td style="font-family:monospace;font-size:13px;font-weight:700;text-align:center;color:var(--navy)">${cur}${ind.unit}</td>
      <td>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill ${color}" style="width:${Math.min(rate||0,100)}%"></div></div>
          <span class="progress-label ${color==='green'?'':''}${rate>=100?'text-green':''}" style="color:${color==='green'?'var(--green)':color==='red'?'var(--red)':color==='amber'?'var(--amber)':'var(--blue)'}">${rate||0}%</span>
        </div>
      </td>
      <td>${getRateBadge(rate||0)}</td>
      <td>${isMapped?'<span class="badge badge-blue">매핑됨</span>':'<span class="badge badge-gray">미매핑</span>'}</td>
      <td>
        <button class="btn btn-xs" style="background:var(--amber-lt);color:#7a5000;border:1px solid var(--amber);margin-right:3px" onclick="openInfoPopup('${ind.id}')">📖</button>
        <button class="btn btn-sm btn-teal" onclick="openInputModal('${ind.id}')" style="margin-right:3px">실적 입력</button>
        <button class="btn btn-sm btn-ghost" onclick="openMappingModal('${ind.id}')">매핑</button>
      </td>

function drawIndicatorChart(id) {
  const ind = IEQAS_PROJECT.indicators.find(i => i.id === id);
  if (!ind) return;
  const el = document.getElementById('chart-ind-' + id);
  if (!el) return;
  const rate = getAchieveRate(ind) || 0;
  const color = getRateColor(rate);
  const colorMap = { green:'#29a745', blue:'#2e5bff', amber:'#f5a623', red:'#e53935' };
  if (charts['ind_'+id]) { try { charts['ind_'+id].destroy(); } catch(e) {} }
  charts['ind_'+id] = new Chart(el, {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [Math.min(rate,100), Math.max(0,100-Math.min(rate,100))],
        backgroundColor: [colorMap[color], '#eef0f5'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '70%',
      plugins: { legend: { display: false }, tooltip: { enabled: false } }
    },
    plugins: [{
      id: 'centerText',
      beforeDraw(chart) {
        const { ctx, chartArea: { top, bottom, left, right } } = chart;
        ctx.save();
        ctx.font = 'bold 22px IBM Plex Mono, monospace';
        ctx.fillStyle = colorMap[color];
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(rate + '%', (left+right)/2, (top+bottom)/2);
        ctx.restore();
      }
    }]
  });
}

function calcProgress(stages) {
  if (!stages) return 0;
  const v = Object.values(stages);
  return Math.round(v.filter(x => x==='완료'||x==='PASS').length / v.length * 100);
}

function saveDirectInput() {
  const id = editingIndicatorId;
  const ind = IEQAS_PROJECT.indicators.find(i => i.id === id);
  if (!ind) return;

  const val = document.getElementById('input-current-val').value;
  const t2026 = document.getElementById('input-target-2026')?.value;
  const t2027 = document.getElementById('input-target-2027')?.value;
  const t2028 = document.getElementById('input-target-2028')?.value;

  const newTargets = {
    '2026': t2026 !== '' && t2026 !== undefined ? Number(t2026) : ind.targets['2026'],
    '2027': t2027 !== '' && t2027 !== undefined ? Number(t2027) : ind.targets['2027'],
    '2028': t2028 !== '' && t2028 !== undefined ? Number(t2028) : ind.targets['2028'],
  };
  ind.targets['2026'] = newTargets['2026'];
  ind.targets['2027'] = newTargets['2027'];
  ind.targets['2028'] = newTargets['2028'];

  const v26_2 = document.getElementById('input-26-2')?.value;

  // law 세부 데이터
  let lawData = null;
  if (id === 'law') {
    function getLawSem(prefix) {
      var get = function(s) { return Number(document.getElementById(s)?.value)||0; };
      var an1_A = get(prefix+'-an1-A'), an1_B = get(prefix+'-an1-B'), an1_C = get(prefix+'-an1-C');
      var an2_A = get(prefix+'-an2-A'), an2_B = get(prefix+'-an2-B');
      var an1_rate = an1_A > 0 ? Math.round((an1_B-an1_C)/an1_A*1000)/10 : null;
      var an2_rate = an2_A > 0 ? Math.round(an2_B/an2_A*1000)/10 : null;
      return { an1_A, an1_B, an1_C, an1_rate, an2_A, an2_B, an2_rate };
    }
    lawData = { '2025': getLawSem('law-2025'), '2026': getLawSem('law-2026') };
  }
  let feeData = null;
  let finalVal = val !== '' ? Number(val) : '';
  if (id === 'fee') {
    function getSemData(semId) {
      var get = function(sid) { return Number(document.getElementById(sid)?.value)||0; };
      var iC = get(semId+'-intl-count'), iT = get(semId+'-intl-total'), iS = get(semId+'-intl-scholar');
      var dC = get(semId+'-dom-count'), dT = get(semId+'-dom-total'), dS = get(semId+'-dom-scholar');
      var iAvg = iC > 0 ? Math.round((iT-iS)/iC) : 0;
      var dAvg = dC > 0 ? Math.round((dT-dS)/dC) : 0;
      var rate = dAvg > 0 ? Math.round(iAvg/dAvg*1000)/10 : 0;
      return { intlCount:iC, intlTotal:iT, intlScholar:iS, intlAvg:iAvg,
               domCount:dC, domTotal:dT, domScholar:dS, domAvg:dAvg, rate:rate };
    }
    const s252 = getSemData('sem-252');
    const s261 = getSemData('sem-261');
    const s262 = getSemData('sem-262');
    const s271 = getSemData('sem-271');
    // 2025년 평균 (25-2 + 26-1)
    const r2025 = [s252.rate, s261.rate].filter(r=>r>0);
    const avg2025 = r2025.length ? Math.round(r2025.reduce((a,b)=>a+b,0)/r2025.length*10)/10 : null;
    // 2026년 평균 (26-2 + 27-1)
    const r2026 = [s262.rate, s271.rate].filter(r=>r>0);
    const avg2026 = r2026.length ? Math.round(r2026.reduce((a,b)=>a+b,0)/r2026.length*10)/10 : null;
    feeData = { '25-2':s252, '26-1':s261, '26-2':s262, '27-1':s271, avg2025, avg2026 };
    if (avg2026 !== null && val === '') finalVal = avg2026;
  }

  saveIndicatorData(id, {
    manualVal: finalVal,
    achieved25_2: id==='fee' && feeData?.avg2025 ? feeData.avg2025 :
                  (document.getElementById('input-25-2').value !== '' ? Number(document.getElementById('input-25-2').value) : null),
    achieved26_1: document.getElementById('input-26-1').value !== '' ? Number(document.getElementById('input-26-1').value) : null,
    achieved26_2: v26_2 !== '' && v26_2 !== undefined ? Number(v26_2) : null,
    targets: newTargets,
    memo: document.getElementById('input-memo').value,
    ...(feeData ? { feeData } : {}),
    ...(lawData ? { lawData } : {})
  });
  closeModal('modal-input');
  toast('저장되었습니다. ✓', 'success');
  showTab(currentTab);
}

function showLawTab(year) {
  document.getElementById('law-panel-2025').style.display = year==='2025' ? '' : 'none';
  document.getElementById('law-panel-2026').style.display = year==='2026' ? '' : 'none';
  var t25 = document.getElementById('law-tab-2025');
  var t26 = document.getElementById('law-tab-2026');
  if (t25) { t25.style.borderColor = year==='2025'?'var(--blue)':''; t25.style.color = year==='2025'?'var(--blue)':''; }
  if (t26) { t26.style.borderColor = year==='2026'?'var(--blue)':''; t26.style.color = year==='2026'?'var(--blue)':''; }
}

function calcLawRate(groupId) {
  var A = Number(document.getElementById(groupId+'-A')?.value)||0;
  var B = Number(document.getElementById(groupId+'-B')?.value)||0;
  var C = Number(document.getElementById(groupId+'-C')?.value)||0;
  var rateEl = document.getElementById(groupId+'-rate');
  if (!A || !rateEl) return;
  var rate;
  if (groupId.includes('an1')) {
    rate = Math.round((B - C) / A * 1000) / 10;
  } else {
    // 2안: C 없음
    rate = Math.round(B / A * 1000) / 10;
  }
  rateEl.textContent = rate > 0 ? rate + '%' : '-';
  // 현재값 자동 반영 (1안 우선)
  if (groupId.includes('an1')) {
    var curEl = document.getElementById('input-current-val');
    if (curEl && !curEl.value && rate > 0) curEl.value = rate;
  }
}

function showFeeTab(year) {
  document.getElementById('fee-panel-2026').style.display = year==='2026' ? '' : 'none';
  document.getElementById('fee-panel-2027').style.display = year==='2027' ? '' : 'none';
  var t26 = document.getElementById('fee-tab-2026');
  var t27 = document.getElementById('fee-tab-2027');
  if (t26) { t26.style.borderColor = year==='2026'?'var(--blue)':''; t26.style.color = year==='2026'?'var(--blue)':''; }
  if (t27) { t27.style.borderColor = year==='2027'?'var(--blue)':''; t27.style.color = year==='2027'?'var(--blue)':''; }
}

function calcFeeRateSem(semId) {
  var iC = Number(document.getElementById(semId+'-intl-count')?.value)||0;
  var iT = Number(document.getElementById(semId+'-intl-total')?.value)||0;
  var iS = Number(document.getElementById(semId+'-intl-scholar')?.value)||0;
  var dC = Number(document.getElementById(semId+'-dom-count')?.value)||0;
  var dT = Number(document.getElementById(semId+'-dom-total')?.value)||0;
  var dS = Number(document.getElementById(semId+'-dom-scholar')?.value)||0;
  var iAvg = iC > 0 ? Math.round((iT-iS)/iC) : 0;
  var dAvg = dC > 0 ? Math.round((dT-dS)/dC) : 0;
  var rate = dAvg > 0 ? Math.round(iAvg/dAvg*1000)/10 : 0;
  var iEl = document.getElementById(semId+'-intl-avg');
  var dEl = document.getElementById(semId+'-dom-avg');
  var rEl = document.getElementById(semId+'-rate');
  if (iEl) iEl.value = iAvg > 0 ? iAvg : '';
  if (dEl) dEl.value = dAvg > 0 ? dAvg : '';
  if (rEl) rEl.textContent = rate > 0 ? rate + '%' : '-';
  // 연도별 평균 계산
  calcFeeYearAvg();
}

function calcFeeYearAvg() {
  // 2025년: sem-252 + sem-261 평균
  var r252 = parseRate(document.getElementById('sem-252-rate')?.textContent);
  var r261 = parseRate(document.getElementById('sem-261-rate')?.textContent);
  var r2025El = document.getElementById('fee-result-2026');
  if (r2025El) {
    if (r252 > 0 && r261 > 0) {
      var avg2025 = Math.round((r252 + r261) / 2 * 10) / 10;
      r2025El.textContent = avg2025 + '%';
    } else if (r252 > 0) { r2025El.textContent = r252 + '%'; }
    else if (r261 > 0) { r2025El.textContent = r261 + '%'; }
  }
  // 2026년: sem-262 + sem-271 평균
  var r262 = parseRate(document.getElementById('sem-262-rate')?.textContent);
  var r271 = parseRate(document.getElementById('sem-271-rate')?.textContent);
  var r2026El = document.getElementById('fee-result-2027');
  if (r2026El) {
    if (r262 > 0 && r271 > 0) {
      var avg2026 = Math.round((r262 + r271) / 2 * 10) / 10;
      r2026El.textContent = avg2026 + '%';
      // 현재값 자동 반영
      var curEl = document.getElementById('input-current-val');
      if (curEl && !curEl.value) curEl.value = avg2026;
    } else if (r262 > 0) { r2026El.textContent = r262 + '%'; }
    else if (r271 > 0) { r2026El.textContent = r271 + '%'; }
  }
}

function parseRate(str) {
  if (!str || str === '-') return 0;
  return parseFloat(str.replace('%','')) || 0;
}

function openMappingModal(id) {
  mappingIndicatorId = id;
  const ind = IEQAS_PROJECT.indicators.find(i => i.id === id);
  if (!ind) return;
  const mappings = getMappings();
  const mappedIds = mappings[id] || [];

  const taskItems = tasks.length
    ? tasks.map(t => `
      <div class="mapping-row">
        <input type="checkbox" id="map-${t.id}" ${mappedIds.includes(t.id)?'checked':''}/>
        <label for="map-${t.id}" style="flex:1;cursor:pointer">
          <div class="prog-name">${t.name}</div>
          <div class="prog-meta">${t.manager} · ${t.category} · ${t.semester}</div>
        </label>
        <div class="prog-value">${t.pIntl?t.pIntl+'명 국제학생':''}</div>
      </div>`).join('')
    : '<div style="color:var(--gray-3);padding:16px;text-align:center">등록된 업무가 없습니다.<br>메인 시스템에서 업무를 먼저 등록해 주세요.</div>';

  document.getElementById('modal-mapping-title').textContent = '🔗 프로그램 매핑 — ' + ind.name;
  document.getElementById('modal-mapping-body').innerHTML = `
    <div class="alert alert-blue" style="margin-bottom:14px">
      집계 방식: <strong>${ind.mappingType==='count'?'✅ 완료/진행중 프로그램 건수 집계':ind.mappingType==='participants'?'👤 국제학생(pIntl) 참여 인원 합계':'✏️ 수동 입력 (자동계산 없음)'}</strong>
    </div>
    <div style="max-height:400px;overflow-y:auto">${taskItems}</div>`;
  openModal('modal-mapping');
}

function saveMappingModal() {
  const id = mappingIndicatorId;
  const checkboxes = document.querySelectorAll('#modal-mapping-body input[type=checkbox]');
  const selectedIds = [];
  checkboxes.forEach(cb => { if (cb.checked) selectedIds.push(cb.id.replace('map-',''));  });
  const m = getMappings();
  m[id] = selectedIds;
  saveMappings(m);
  closeModal('modal-mapping');
  toast(`${selectedIds.length}개 프로그램이 매핑되었습니다.`, 'success');
  showTab(currentTab);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) closeModal(o.id); });
});

  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2800);
}

  const sb = document.getElementById('perf-sidebar');
  const ov = document.getElementById('sidebar-overlay-perf');
  if (!sb) return;
  const isOpen = sb.classList.contains('open');

  }

  document.getElementById('info-popup-body').innerHTML = `
    <div style="margin-bottom:16px">
      <span style="background:${badgeBg};color:${badgeColor};border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700">${detail.badge}</span>
    </div>
    ${body}`;
  document.getElementById('info-popup-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeInfoPopup() {
  document.getElementById('info-popup-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

// ESC 키로 닫기
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeInfoPopup();
});
tasks = getTasks();
// 저장된 목표값을 지표에 즉시 반영
IEQAS_PROJECT.indicators.forEach(ind => {
  const d = getIndicatorData(ind.id);
  if (d.targets) {
    if (d.targets['2026'] !== undefined) ind.targets['2026'] = d.targets['2026'];
    if (d.targets['2027'] !== undefined) ind.targets['2027'] = d.targets['2027'];
    if (d.targets['2028'] !== undefined) ind.targets['2028'] = d.targets['2028'];
  }
});
showTab('overview');

// 30초마다 자동 갱신
setInterval(async () => {
  if (!APPS_SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
    try {
      const res = await fetch(APPS_SCRIPT_URL + '?action=getAll&t=' + Date.now());
      const json = await res.json();
      if (json.ok && json.data && json.data.tasks) {
        tasks = json.data.tasks;
        localStorage.setItem(STORE_KEY+'_tasks', JSON.stringify(tasks));
        showTab(currentTab);
        document.getElementById('sync-status').textContent = '✓ 자동 갱신됨';
      }
    } catch(e) {}
  }
}, 30000);
</script>
</body>
</html>
