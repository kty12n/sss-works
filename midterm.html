<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 및 성과 관리 시스템 - 중장기발전계획</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap');
:root{
  --navy:#1a2744;--navy-mid:#253360;--blue:#2e5bff;--blue-lt:#e8eeff;
  --teal:#00b6a8;--teal-lt:#e0f7f5;--amber:#f5a623;--amber-lt:#fff4e0;
  --red:#e53935;--red-lt:#fdecea;--green:#29a745;--green-lt:#e8f5e9;
  --purple:#7c3aed;--purple-lt:#ede9fe;
  --gray-0:#f7f8fc;--gray-1:#eef0f5;--gray-2:#d6dae6;--gray-3:#9ba3b8;
  --gray-4:#6b738a;--text:#1e2640;--white:#fff;
  --shadow:0 2px 12px rgba(26,39,68,.10);--shadow-lg:0 8px 32px rgba(26,39,68,.16);
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--gray-0);color:var(--text);}

.header{background:var(--navy);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.header-left{display:flex;align-items:center;gap:10px;}
.back-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;}
.back-btn:hover{background:rgba(255,255,255,.2);}
.header-title{color:#fff;font-size:15px;font-weight:700;}
.header-badge{background:var(--purple);color:#fff;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;}
.sync-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;}

.layout{display:flex;min-height:calc(100vh - 60px);}
.sidebar{width:240px;background:var(--white);border-right:1px solid var(--gray-1);padding:16px 0;flex-shrink:0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;}
.sidebar-section{padding:10px 16px 4px;font-size:10px;font-weight:700;color:var(--gray-3);letter-spacing:.08em;text-transform:uppercase;}
.sidebar-menu{list-style:none;}
.sidebar-menu li a{display:flex;align-items:center;gap:8px;padding:9px 18px;font-size:13px;font-weight:500;color:var(--gray-4);cursor:pointer;border-left:3px solid transparent;transition:all .15s;}
.sidebar-menu li a:hover,.sidebar-menu li a.active{background:var(--purple-lt);color:var(--purple);border-left-color:var(--purple);}
.sidebar-menu li a.sub{padding-left:32px;font-size:12px;}

.content{flex:1;padding:24px 28px;overflow-x:hidden;}
.page-title{font-size:20px;font-weight:900;color:var(--navy);margin-bottom:4px;}
.page-subtitle{font-size:12px;color:var(--gray-4);margin-bottom:20px;}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;margin-bottom:18px;}
.card-title{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px;}

/* 전략 카드 */
.strategy-card{background:var(--white);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.strategy-header{padding:14px 20px;background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;}
.strategy-title{font-size:14px;font-weight:800;}
.strategy-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:3px;}
.task-row{padding:14px 20px;border-bottom:1px solid var(--gray-1);display:flex;align-items:center;gap:12px;}
.task-row:last-child{border-bottom:none;}
.task-num{background:var(--purple-lt);color:var(--purple);font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;flex-shrink:0;}
.task-name{font-size:13px;font-weight:600;flex:1;color:var(--text);}
.task-progress{display:flex;align-items:center;gap:8px;min-width:140px;}
.prog-bar{flex:1;height:8px;background:var(--gray-1);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;background:var(--purple);}
.prog-label{font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--purple);white-space:nowrap;}

/* 지표 테이블 */
.ind-table{width:100%;border-collapse:collapse;font-size:13px;}
.ind-table th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left;font-size:12px;font-weight:600;}
.ind-table td{padding:10px 12px;border-bottom:1px solid var(--gray-1);vertical-align:top;}
.ind-table tr:last-child td{border-bottom:none;}
.ind-table tr:hover td{background:var(--gray-0);}

/* stat */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border-top:4px solid var(--purple);}
.stat-label{font-size:11px;font-weight:600;color:var(--gray-4);margin-bottom:6px;}
.stat-value{font-size:24px;font-weight:900;font-family:'IBM Plex Mono',monospace;color:var(--navy);}
.stat-sub{font-size:11px;color:var(--gray-3);margin-top:4px;}

/* badge */
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-purple{background:var(--purple-lt);color:var(--purple);}
.badge-green{background:var(--green-lt);color:#1a6e2e;}
.badge-amber{background:var(--amber-lt);color:#7a5000;}
.badge-blue{background:var(--blue-lt);color:var(--blue);}
.badge-gray{background:var(--gray-1);color:var(--gray-4);}

/* 입력 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding:20px 0;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:14px;width:720px;max-width:96vw;margin:auto;box-shadow:var(--shadow-lg);}
.modal-header{padding:18px 22px 12px;border-bottom:1px solid var(--gray-1);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:16px;font-weight:800;color:var(--navy);}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-3);}
.modal-body{padding:18px 22px;}
.modal-footer{padding:12px 22px;border-top:1px solid var(--gray-1);display:flex;justify-content:flex-end;gap:10px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--gray-4);margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1.5px solid var(--gray-2);border-radius:7px;font-family:inherit;font-size:13px;color:var(--text);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--purple);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-row.triple{grid-template-columns:1fr 1fr 1fr;}
.btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .18s;}
.btn-primary{background:var(--purple);color:#fff;}
.btn-primary:hover{background:#6326cc;}
.btn-ghost{background:transparent;color:var(--gray-4);border:1px solid var(--gray-2);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}

/* progress circle */
.prog-circle{position:relative;width:80px;height:80px;}
.prog-circle svg{transform:rotate(-90deg);}
.prog-circle-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;font-family:'IBM Plex Mono',monospace;color:var(--navy);}

/* chart */
.chart-container{position:relative;height:240px;}

/* info popup */
.info-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600;align-items:flex-start;justify-content:center;padding:30px;overflow-y:auto;}
.info-overlay.open{display:flex;}
.info-box{background:var(--white);border-radius:14px;width:700px;max-width:96vw;margin:auto;box-shadow:var(--shadow-lg);}
.info-header{background:linear-gradient(135deg,var(--navy),var(--navy-mid));padding:18px 22px;border-radius:14px 14px 0 0;display:flex;justify-content:space-between;align-items:center;}
.info-header h3{color:#fff;font-size:16px;font-weight:800;}
.info-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;}
.info-body{padding:20px 22px;max-height:70vh;overflow-y:auto;}
.info-section{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--gray-1);}
.info-section:last-child{border-bottom:none;}
.info-section-title{font-size:11px;font-weight:700;color:var(--gray-4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.info-section-body{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap;}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;box-shadow:var(--shadow-lg);z-index:999;opacity:0;transform:translateY(12px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{background:var(--green);}

/* 해밍거 */
.hamburger-mid{display:none;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 10px;border-radius:6px;font-size:18px;cursor:pointer;}
.sidebar-overlay-mid{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;}

@media(max-width:768px){
  .hamburger-mid{display:flex;align-items:center;justify-content:center;}
  .sidebar{position:fixed!important;top:0;left:0;bottom:0;width:260px!important;z-index:60;transform:translateX(-100%);transition:transform .28s;height:100vh;padding-top:16px;}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay-mid.show{display:block;}
  .layout{display:block;}
  .content{padding:14px 12px;overflow-x:hidden;}
  .stat-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px!important;}
  .form-row,.form-row.triple{grid-template-columns:1fr!important;}
  .modal{width:96vw!important;}
  .header-badge{display:none;}
}
</style>
</head>
<body>

  </nav>
  <div class="content" id="mid-content"></div>
</div>

<!-- 입력 모달 -->
<div class="modal-overlay" id="modal-mid-input">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-mid-title">실행과제 현재값 입력</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>

      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveMidInput()">저장</button>

</div>

<!-- 상세 설명 팝업 -->
<div class="info-overlay" id="info-overlay">
  <div class="info-box">
    <div class="info-header">

</div>

// 세부 필드 자동계산
function calcIndField(indId) {
  const def = IND_FIELDS[indId];
  if (!def) return;
  const vals = {};
  def.fields.forEach(f => {
    const el = document.getElementById('if-'+indId+'-'+f.id);
    vals[f.id] = el ? (parseFloat(el.value)||0) : 0;
  });
  const result = def.calc ? def.calc(vals) : null;
  const resEl = document.getElementById('if-'+indId+'-result');
  if (resEl && result !== null) {
    resEl.textContent = '→ ' + result + '%';
    resEl.style.color = result>=100?'var(--green)':result>=80?'var(--blue)':'var(--amber)';
    // 지표 결과 input에도 자동 반영
    const valEl = document.getElementById('ind-'+indId);
    if (valEl) valEl.value = result;
  }
}

// 세부 필드 렌더링
function renderIndDetailFields(indId, savedVals) {
  const def = IND_FIELDS[indId];
  if (!def) return '';
  const sv = savedVals || {};
  const fieldHtml = def.fields.map(f => {
    const val = sv[f.id] !== undefined ? sv[f.id] : '';
    if (f.type === 'select') {
      return `<div class="form-group" style="margin-bottom:8px">
        <label style="font-size:11px;color:var(--gray-4)">${f.label}</label>
        <select id="if-${indId}-${f.id}" onchange="calcIndField('${indId}')" style="width:100%;padding:8px 10px;border:1.5px solid var(--gray-2);border-radius:6px;font-size:13px">
          <option value="0" ${val==0?'selected':''}>0 (미구축)</option>
          <option value="1" ${val==1?'selected':''}>1 (구축완료)</option>
        </select>
      </div>`;
    }
    return `<div class="form-group" style="margin-bottom:8px">
      <label style="font-size:11px;color:var(--gray-4)">${f.label} ${f.unit?'('+f.unit+')':''}</label>
      <input type="number" id="if-${indId}-${f.id}" value="${val}" placeholder="0" step="0.1"
        oninput="calcIndField('${indId}')"
        style="width:100%;padding:8px 10px;border:1.5px solid var(--gray-2);border-radius:6px;font-size:13px"/>
    </div>`;
  }).join('');
  return `<div style="background:var(--blue-lt);border-radius:8px;padding:12px;margin-top:8px">
    <div style="font-size:11px;color:var(--gray-4);margin-bottom:8px">📐 산출식: ${def.formula}</div>
    ${fieldHtml}
    <div id="if-${indId}-result" style="font-size:13px;font-weight:700;margin-top:6px;padding:6px 10px;background:var(--white);border-radius:5px"></div>
  </div>`;
}

// ── 저장소 ──
let _midData = {};
let _charts = {};
let _curTab = 'overview';
let _editingId = null;

function getMidData(id) { return _midData[id] || {}; }
function saveMidData(id, data) {
  _midData[id] = { ..._midData[id], ...data, updatedAt: new Date().toISOString() };
  _db.ref('sj_v1/midterm/' + id).set(_midData[id]);
  toast('저장되었습니다 ✓', 'success');
}

function getSubtask(id) {
  for (const t of MID_PLAN.tasks)
    for (const s of t.subtasks)
      if (s.id === id) return s;
  return null;
}

function getAchieveRate(subtaskId) {
  const d = getMidData(subtaskId);
  const st = getSubtask(subtaskId);
  if (!st || !d.currentVal || !st.targets['26']) return null;
  return Math.round(d.currentVal / st.targets['26'] * 100);
}

function getRateColor(rate) {
  if (!rate) return 'var(--gray-3)';
  if (rate >= 100) return 'var(--green)';
  if (rate >= 80) return 'var(--blue)';
  if (rate >= 60) return 'var(--amber)';
  return 'var(--red)';
}

// ── 탭 렌더링 ──
const $c = () => document.getElementById('mid-content');

function showTab(tab) {
  _curTab = tab;
  if (window.innerWidth <= 768) closeMidSidebar();
  document.querySelectorAll('.sidebar-menu li a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('onclick')?.includes("'"+tab+"'"));
  });
  Object.values(_charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  _charts = {};

  const renders = {
    overview: renderOverview,
    chart: renderChart,
    t211: () => renderSubtask('t211'),
    t212: () => renderSubtask('t212'),
    t213: () => renderSubtask('t213'),
    t221: () => renderSubtask('t221'),
    t222: () => renderSubtask('t222'),
    t223: () => renderSubtask('t223'),
    'settings-mid': renderSettings,
  };
  $c().innerHTML = (renders[tab] || renderOverview)();
  requestAnimationFrame(() => requestAnimationFrame(() => {
    if (tab === 'chart') drawCharts();
  }));
}

function renderOverview() {
  const allSubs = MID_PLAN.tasks.flatMap(t => t.subtasks);
  const achieved = allSubs.filter(s => (getAchieveRate(s.id)||0) >= 100).length;
  const entered  = allSubs.filter(s => getMidData(s.id).currentVal != null).length;

  const taskCards = MID_PLAN.tasks.map(t => {
    const rows = t.subtasks.map(s => {
      const d = getMidData(s.id);
      const rate = getAchieveRate(s.id);
      const color = getRateColor(rate);
      const pct = Math.min(rate||0, 100);
      return `<div class="task-row">
        <span class="task-num">${s.num}</span>
        <span class="task-name">${s.name}</span>
        <div class="task-progress">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
          <span class="prog-label" style="color:${color}">${rate!=null?rate+'%':'-'}</span>
        </div>
        <button class="btn btn-xs" style="background:var(--amber-lt);color:#7a5000;border:1px solid var(--amber);margin-right:4px" onclick="openInfo('${s.id}')">📖</button>
        <button class="btn btn-xs" style="background:var(--purple-lt);color:var(--purple);border:1px solid var(--purple)" onclick="openInput('${s.id}')">✏️ 입력</button>
      </div>`;
    }).join('');
    return `<div class="strategy-card">
      <div class="strategy-header">
        <div class="strategy-title">전략과제 ${t.num}: ${t.name}</div>
        <div class="strategy-sub">실행과제 ${t.subtasks.length}개</div>
      </div>
      ${rows}
    </div>`;
  }).join('');

  return `
  <div class="page-title">📋 ${MID_PLAN.direction}: ${MID_PLAN.name}</div>
  <div class="page-subtitle">중장기발전계획 실행과제별 성과관리 현황 (${new Date().toLocaleDateString('ko-KR')} 기준)</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">전체 실행과제</div><div class="stat-value">${allSubs.length}</div><div class="stat-sub">전략과제 2개</div></div>
    <div class="stat-card" style="border-top-color:var(--green)"><div class="stat-label">목표 달성</div><div class="stat-value" style="color:var(--green)">${achieved}</div><div class="stat-sub">100% 이상</div></div>
    <div class="stat-card" style="border-top-color:var(--blue)"><div class="stat-label">값 입력됨</div><div class="stat-value" style="color:var(--blue)">${entered}</div><div class="stat-sub">/ ${allSubs.length}개</div></div>
    <div class="stat-card" style="border-top-color:var(--amber)"><div class="stat-label">미입력</div><div class="stat-value" style="color:var(--amber)">${allSubs.length - entered}</div><div class="stat-sub">입력 필요</div></div>
  </div>
  <div class="card" style="background:var(--blue-lt);border:1px solid var(--blue);margin-bottom:18px">
    <div style="font-size:13px;color:var(--blue)">💡 <strong>✏️ 입력</strong> 버튼으로 각 실행과제의 현재값과 연도별 목표를 입력하세요. <strong>📖</strong> 버튼으로 실행과제 상세 정보를 확인할 수 있습니다.</div>
  </div>
  ${taskCards}`;
}

function renderChart() {
  const allSubs = MID_PLAN.tasks.flatMap(t => t.subtasks);
  return `
  <div class="page-title">📈 차트 분석</div>
  <div class="page-subtitle">실행과제별 달성률 시각화</div>
  <div class="card">
    <div class="card-title">📊 전체 실행과제 달성률</div>
    <div class="chart-container" style="height:${allSubs.length*45+60}px"><canvas id="chart-hbar"></canvas></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="card-title">🍩 달성 현황 분포</div>
      <div class="chart-container"><canvas id="chart-doughnut"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">📅 연도별 목표 (2026~2028)</div>
      <div class="chart-container"><canvas id="chart-year"></canvas></div>
    </div>
  </div>`;
}

function drawCharts() {
  const allSubs = MID_PLAN.tasks.flatMap(t => t.subtasks);
  // 수평 막대
  const hbarEl = document.getElementById('chart-hbar');
  if (hbarEl) {
    _charts.hbar = new Chart(hbarEl, {
      type: 'bar',
      data: {
        labels: allSubs.map(s => s.num + ' ' + s.name.slice(0,20) + (s.name.length>20?'…':'')),
        datasets: [{
          label: '달성률 (%)',
          data: allSubs.map(s => getAchieveRate(s.id)||0),
          backgroundColor: allSubs.map(s => {
            const r = getAchieveRate(s.id)||0;
            return r>=100?'rgba(41,167,69,.7)':r>=80?'rgba(46,91,255,.7)':r>=60?'rgba(245,166,35,.7)':'rgba(124,58,237,.4)';
          }),
          borderWidth: 0,
        }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { min: 0, max: 150, ticks: { callback: v => v+'%' } }, y: { ticks: { font: { size: 11 } } } }
      }
    });
  }
  // 도넛
  const dEl = document.getElementById('chart-doughnut');
  if (dEl) {
    const achieved = allSubs.filter(s => (getAchieveRate(s.id)||0) >= 100).length;
    const near = allSubs.filter(s => { const r=getAchieveRate(s.id)||0; return r>=80&&r<100; }).length;
    const low = allSubs.filter(s => (getAchieveRate(s.id)||0) < 80 && getMidData(s.id).currentVal!=null).length;
    const none = allSubs.filter(s => getMidData(s.id).currentVal==null).length;
    _charts.doughnut = new Chart(dEl, {
      type: 'doughnut',
      data: {
        labels: ['달성(100%+)', '근접(80~99%)', '미달(<80%)', '미입력'],
        datasets: [{ data: [achieved,near,low,none], backgroundColor: ['#29a745','#2e5bff','#f5a623','#d6dae6'], borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
    });
  }
  // 연도별
  const yEl = document.getElementById('chart-year');
  if (yEl) {
    const hastarget = allSubs.filter(s => getSubtask(s.id)?.targets['26']);
    _charts.year = new Chart(yEl, {
      type: 'bar',
      data: {
        labels: hastarget.map(s => s.num),
        datasets: [
          { label: '\'26 목표', data: hastarget.map(s => getSubtask(s.id)?.targets['26']||0), backgroundColor: 'rgba(124,58,237,.4)', borderColor: '#7c3aed', borderWidth: 1 },
          { label: '\'26 현재', data: hastarget.map(s => getMidData(s.id).currentVal||0), backgroundColor: 'rgba(0,182,168,.5)', borderColor: '#00b6a8', borderWidth: 1 },
          { label: '\'27 목표', data: hastarget.map(s => getSubtask(s.id)?.targets['27']||0), backgroundColor: 'rgba(46,91,255,.2)', borderColor: '#2e5bff', borderWidth: 1 },
        ]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }, scales: { y: { beginAtZero: true } } }
    });
  }
}

function renderSubtask(id) {

    <div class="stat-card" style="border-top-color:${color}"><div class="stat-label">달성률</div><div class="stat-value" style="color:${color}">${rate!=null?rate+'%':'-'}</div></div>

    <div class="form-group">
      <label>메모</label>
      <textarea id="mid-memo" rows="2" placeholder="비고 사항">${d.memo||''}</textarea>
    </div>`;
  document.getElementById('modal-mid-input').classList.add('open');
}

function saveMidInput() {
  const id = _editingId;
  const st = getSubtask(id);
  if (!st) return;
  const indicators = {};
  const indDetail = {};
  st.indicators.forEach(ind => {
    const val = document.getElementById('ind-'+ind.id)?.value;
    if (val !== '') indicators[ind.id] = Number(val);
    // 세부 필드 저장
    const def = IND_FIELDS[ind.id];
    if (def) {
      const detail = {};
      def.fields.forEach(f => {
        const el = document.getElementById('if-'+ind.id+'-'+f.id);
        if (el && el.value !== '') detail[f.id] = parseFloat(el.value)||0;
      });
      if (Object.keys(detail).length) indDetail[ind.id] = detail;
    }
  });
  const t26 = document.getElementById('mid-target-26')?.value;
  const t27 = document.getElementById('mid-target-27')?.value;
  const t28 = document.getElementById('mid-target-28')?.value;
  // 타겟을 MID_PLAN에도 반영
  if (t26) st.targets['26'] = Number(t26);
  if (t27) st.targets['27'] = Number(t27);
  if (t28) st.targets['28'] = Number(t28);
  saveMidData(id, {
    currentVal: document.getElementById('mid-current-val')?.value !== '' ? Number(document.getElementById('mid-current-val').value) : null,
    currentLevel: document.getElementById('mid-current-level')?.value !== '' ? Number(document.getElementById('mid-current-level').value) : null,
    targets: { '26': t26?Number(t26):null, '27': t27?Number(t27):null, '28': t28?Number(t28):null },
    indicators,
    indDetail,
    memo: document.getElementById('mid-memo')?.value || ''
  });
  closeModal();
  showTab(_curTab);
}

function closeModal() {
  document.getElementById('modal-mid-input').classList.remove('open');
}

// ── 상세 설명 팝업 ──
function openInfo(id) {
  const st = getSubtask(id);
  if (!st) return;
  document.getElementById('info-title').textContent = st.num + ': ' + st.name;
  document.getElementById('info-body').innerHTML = `
    <div class="info-section">
      <div class="info-section-title">실행과제 정의</div>
      <div class="info-section-body">${st.definition}</div>
    </div>
    <div class="info-section">
      <div class="info-section-title">산출식</div>
      <div class="info-section-body" style="background:var(--gray-0);border-radius:7px;padding:12px">${st.formula}</div>
    </div>
    <div class="info-section">
      <div class="info-section-title">세부 지표</div>
      <div>${st.indicators.map((ind,i) => `<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray-1);font-size:13px"><span style="color:var(--purple);font-weight:700;min-width:20px">${i+1}</span><span>${ind.name}</span><span style="color:var(--gray-4);font-size:12px">(${ind.unit})</span></div>`).join('')}</div>
    </div>
    <div class="info-section">
      <div class="info-section-title">이행점검 주기</div>
      <div class="info-section-body">${st.checkCycle}</div>
    </div>`;
  document.getElementById('info-overlay').classList.add('open');
}
function closeInfo() { document.getElementById('info-overlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeInfo(); } });

// ── 토스트 ──
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2800);
}

// ── 모바일 사이드바 ──
function toggleMidSidebar() {
  const sb = document.getElementById('mid-sidebar');
  const ov = document.getElementById('mid-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
}
function closeMidSidebar() {
  document.getElementById('mid-sidebar').classList.remove('open');
  document.getElementById('mid-overlay').classList.remove('show');
}

// ── 메인으로 ──
function goBack() { window.location.href = 'index.html'; }

// ── Firebase 로드 ──
async function refreshAll() {
  try {
    const snap = await _db.ref('sj_v1/midterm').once('value');
    _midData = snap.val() || {};
    showTab(_curTab);
    toast('갱신됨', 'success');
  } catch(e) { console.warn('로드 실패:', e.message); }
}

// ── 초기화 ──
(async () => {
  await refreshAll();
  // 실시간 리스너
  _db.ref('sj_v1/midterm').on('value', snap => {
    _midData = snap.val() || {};
    showTab(_curTab);
  });
})();
</script>
</body>
</html>
